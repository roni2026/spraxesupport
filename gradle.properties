org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# --- Supabase configuration ---
# These are read into BuildConfig fields by app/build.gradle.kts.
# The Supabase URL below matches the Spraxe web app + customer app
# (kybgrsqqvejbvjediowo.supabase.co).
# SUPABASE_ANON_KEY is the public "anon" key from Supabase Project Settings > API.
# It is safe to ship in a client app (access is enforced by Row Level Security on the
# server), but it is NOT committed with a real value here -- replace the placeholder
# below with your project's anon key, or override it in a local (gitignored)
# gradle.properties / -PsupabaseAnonKey=... on the command line / CI secret so the
# real key never has to live in git history.
SUPABASE_URL=https://kybgrsqqvejbvjediowo.supabase.co
SUPABASE_ANON_KEY=REPLACE_WITH_YOUR_SUPABASE_ANON_KEY
